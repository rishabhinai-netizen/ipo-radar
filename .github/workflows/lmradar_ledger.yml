name: Signal ledger + alerts
on:
  schedule: [{cron: "45 15 * * 1-5"}]
  workflow_dispatch: {}
jobs:
  ledger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python signal_ledger.py
        env:
          SUPA_KEY: ${{ secrets.SUPA_SERVICE_KEY }}
