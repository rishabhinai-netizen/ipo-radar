name: Daily IPO Radar refresh

on:
  schedule:
    - cron: "15 14 * * 1-5"   # 7:45 pm IST, Mon-Fri (after bhavcopy publication)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pandas pyarrow numpy
      - name: Refresh data
        run: python pipeline/refresh.py
      - name: Commit updated data
        run: |
          git config user.name "ipo-radar-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data refresh $(date -u +%F)"
          git push
