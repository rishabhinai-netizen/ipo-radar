name: Lead-Manager Radar daily refresh
on:
  schedule: [{cron: "40 13 * * 1-5"}]
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: lmradar } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install requests
      - run: python refresh.py
      - name: Commit refreshed data
        run: |
          git config user.name "lmradar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add lmradar/app_data.json lmradar/cg_master.json lmradar/anchor_*.json lmradar/advisor_trades.json lmradar/ipo_full.json lmradar/nse_all.csv lmradar/bse_all.csv
          git commit -m "lmradar daily refresh $(date -u +%F)" || echo "no changes"
          git push || echo "push skipped"
        working-directory: .
